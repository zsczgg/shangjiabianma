services:
  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    image: shangjiabianma-app:local
    container_name: shangjiabianma-app
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/shangjiabianma.db
      NODE_ENV: production
    volumes:
      - ${DATA_DIR:-./data}:/data
    ports:
      - "3210:3210"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3210').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  backup:
    image: shangjiabianma-app:local
    container_name: shangjiabianma-backup
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/shangjiabianma.db
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: "21600"
      BACKUP_RETENTION_DAYS: "30"
    volumes:
      - ${DATA_DIR:-./data}:/data:ro
      - ${BACKUP_DIR:-./backups}:/backups
    entrypoint: ["node", "scripts/backup-loop.mjs"]
    depends_on:
      app:
        condition: service_healthy
